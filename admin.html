<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manajemen Admin - KPPN Digipay Monitoring</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <script src="assets/js/auth-guard.js"></script>
    <div id="sidebar-container"></div>

    <div class="main-wrapper">
      <div class="container">
        <div class="page-header"><h1>👤 Manajemen Admin</h1><p>Kelola akun admin yang dapat mengakses sistem</p></div>
        <div class="content-card">
          <div class="toolbar">
            <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="searchAdmin" placeholder="Cari admin..." /></div>
            <button class="btn btn-primary" id="btnAddAdmin">+ Tambah Admin</button>
          </div>
          <div class="table-container">
            <table>
              <thead><tr><th>No</th><th>Username</th><th>Dibuat Pada</th><th>Aksi</th></tr></thead>
              <tbody id="adminTableBody"><tr><td colspan="4" class="loading">Memuat data...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL ADMIN -->
    <div id="adminModal" class="modal">
      <div class="modal-content" style="max-width:480px">
        <div class="modal-header"><h2 id="adminModalTitle">Tambah Admin</h2><button class="close-btn" id="closeAdminModal">&#215;</button></div>
        <form id="adminForm">
          <div class="form-group"><label>Username</label><input type="text" id="adminUsername" required placeholder="Username unik" /></div>
          <div class="form-group">
            <label id="adminPassLabel">Password</label>
            <input type="password" id="adminPassword" placeholder="Min. 6 karakter" />
            <p style="font-size:12px;color:#94a3b8;margin-top:5px" id="adminPassHint">Minimal 6 karakter.</p>
          </div>
          <div class="form-group">
            <label>Konfirmasi Password</label>
            <input type="password" id="adminPasswordConfirm" placeholder="Ulangi password" />
            <p style="font-size:12px;color:#ef4444;margin-top:5px;display:none" id="passMatchMsg">Password tidak cocok!</p>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-cancel" id="cancelAdmin">Batal</button>
            <button type="submit" class="btn btn-primary" id="adminSubmitBtn">Simpan</button>
          </div>
        </form>
      </div>
    </div>

    <!-- MODAL HAPUS ADMIN -->
    <div id="deleteAdminModal" class="modal">
      <div class="modal-content" style="max-width:400px">
        <div class="modal-header"><h2>🗑️ Hapus Admin</h2><button class="close-btn" id="closeDeleteAdminModal">&#215;</button></div>
        <p style="color:#475569;margin-bottom:12px">Yakin hapus admin:</p>
        <div style="background:#fee2e2;border-radius:8px;padding:12px;margin-bottom:16px"><strong style="color:#991b1b;font-size:16px" id="deleteAdminName">-</strong></div>
        <p style="color:#94a3b8;font-size:13px">Tindakan ini tidak dapat dibatalkan.</p>
        <div class="modal-actions" style="margin-top:20px">
          <button type="button" class="btn btn-cancel" id="cancelDeleteAdmin">Batal</button>
          <button type="button" id="confirmDeleteAdmin" style="flex:1;padding:14px 24px;background:#ef4444;color:white;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer">🗑️ Hapus</button>
        </div>
      </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script src="assets/js/admin.js"></script>
    <script>
      renderSidebar("manajemen-admin");
      adminPage.init();
    </script>
  </body>
</html>
